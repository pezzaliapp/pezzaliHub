<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PezzaliHub</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f5f7;
  color:#1d1d1f;
}

header{
  padding:20px;
  font-weight:600;
  font-size:20px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
}

.card{
  background:white;
  border-radius:16px;
  padding:20px;
  text-decoration:none;
  color:inherit;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.title{
  font-weight:600;
  margin-top:10px;
}

.desc{
  font-size:13px;
  color:#6e6e73;
}
</style>
</head>

<body>

<header>PezzaliHub</header>

<div class="container">
  <div class="grid">

    <a class="card" href="https://www.pezzaliapp.com" target="_blank">
      <div class="title">PezzaliAPP</div>
      <div class="desc">Sito principale</div>
    </a>

    <a class="card" href="https://www.alessandropezzali.it/CSVXpressSmart/" target="_blank">
      <div class="title">CSVXpressSmart</div>
      <div class="desc">Listini e margini</div>
    </a>

    <a class="card" href="https://www.alessandropezzali.it/CheckappExcel/" target="_blank">
      <div class="title">CheckappExcel</div>
      <div class="desc">Controllo dati</div>
    </a>

    <a class="card" href="https://www.alessandropezzali.it/TechAssist-AI-by-PezzaliApp/" target="_blank">
      <div class="title">TechAssist AI</div>
      <div class="desc">Supporto tecnico</div>
    </a>

    <a class="card" href="https://www.alessandropezzali.it/triagefirst/" target="_blank">
      <div class="title">TriageFirst</div>
      <div class="desc">Triage informativo</div>
    </a>

    <a class="card" href="https://www.alessandropezzali.it/djapp/" target="_blank">
      <div class="title">djApp</div>
      <div class="desc">Console DJ</div>
    </a>

  </div>
</div>

</body>
</html>
