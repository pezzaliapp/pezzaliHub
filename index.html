<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PezzaliHub</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f5f5f7;
  color:#1d1d1f;
}

header{
  padding:20px;
  text-align:center;
  font-weight:600;
  font-size:20px;
}

.search{
  max-width:600px;
  margin:0 auto 20px;
  padding:0 20px;
}

.search input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

.filters{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.filters button{
  padding:8px 14px;
  border-radius:20px;
  border:none;
  background:#e5e5ea;
  cursor:pointer;
}

.filters button.active{
  background:#1d1d1f;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:16px;
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:white;
  border-radius:18px;
  padding:16px;
  text-align:center;
  text-decoration:none;
  color:inherit;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.icon{
  font-size:30px;
  margin-bottom:10px;
}

.name{
  font-size:14px;
  font-weight:500;
}
</style>
</head>

<body>

<header>PezzaliHub</header>

<div class="search">
  <input id="search" placeholder="Cerca app..." />
</div>

<div class="filters">
  <button data-cat="all" class="active">Tutte</button>
  <button data-cat="commerciale">Commerciale</button>
  <button data-cat="ai">AI</button>
  <button data-cat="utility">Utility</button>
  <button data-cat="lab">Lab</button>
</div>

<div class="grid" id="grid"></div>

<script>

const apps = [

/* BUSINESS */
{ name:"CSVXpressSmart", cat:"commerciale", url:"https://www.alessandropezzali.it/CSVXpressSmart/", icon:"📊" },
{ name:"CheckappExcel", cat:"commerciale", url:"https://www.alessandropezzali.it/CheckappExcel/", icon:"📈" },
{ name:"PriceXpress", cat:"commerciale", url:"#", icon:"💰" },
{ name:"CRM-PWA", cat:"commerciale", url:"#", icon:"📋" },

/* AI */
{ name:"TechAssist AI", cat:"ai", url:"https://www.alessandropezzali.it/TechAssist-AI-by-PezzaliApp/", icon:"⚙️" },
{ name:"TriageFirst", cat:"ai", url:"https://www.alessandropezzali.it/triagefirst/", icon:"🧠" },

/* UTILITY */
{ name:"djApp", cat:"utility", url:"https://www.alessandropezzali.it/djapp/", icon:"🎧" },

/* LAB */
{ name:"Quantum Lab", cat:"lab", url:"#", icon:"⚛️" }

];

let currentCat = "all";

const grid = document.getElementById("grid");
const search = document.getElementById("search");

function render(){
  const q = search.value.toLowerCase();

  grid.innerHTML = "";

  apps
    .filter(a =>
      (currentCat === "all" || a.cat === currentCat) &&
      a.name.toLowerCase().includes(q)
    )
    .forEach(a => {

      const el = document.createElement("a");
      el.href = a.url;
      el.target="_blank";
      el.className="card";

      el.innerHTML = `
        <div class="icon">${a.icon}</div>
        <div class="name">${a.name}</div>
      `;

      grid.appendChild(el);
    });
}

search.addEventListener("input", render);

document.querySelectorAll(".filters button").forEach(btn=>{
  btn.onclick = () => {
    document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentCat = btn.dataset.cat;
    render();
  }
});

render();

</script>

</body>
</html>
